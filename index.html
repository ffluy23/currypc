<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>요리 대결</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="gameWrapper">
  <canvas id="gameCanvas"></canvas>

  <!-- ── HUD ── -->
  <div id="hud">
    <div class="hud-box">⏱<br><span class="hud-val" id="timerVal">--</span></div>
    <div class="hud-box" style="text-align:center">단계<br><span class="hud-val" id="phaseName">-</span></div>
    <div class="hud-box" style="text-align:right">점수<br><span class="hud-val" id="scoreVal">0</span></div>
  </div>

  <!-- ── Stir direction hint ── -->
  <div id="stirHintDir"></div>

  <!-- ── Stir speed bar (right side) ── -->
  <div id="stirSpeedBar">
    <div id="stirSpeedOuter"><div id="stirSpeedFill" style="height:0%"></div></div>
    <div id="stirSpeedLabel">속도</div>
  </div>

  <!-- ── Fire rhythm bar ── -->
  <div id="rhythmWrap">
    <div id="rhythmLabel">🔥 초록 구간에서 TAP!</div>
    <div id="rhythmTrack">
      <div id="rhythmZone" style="left:0%;width:0%"></div>
      <div id="rhythmCursor" style="left:0%"></div>
    </div>
  </div>

  <!-- ── Fire TAP button (mobile + desktop) ── -->
  <button id="tapBtn">🔥 TAP!</button>

  <!-- ── Feedback popup ── -->
  <div id="feedback"></div>

  <!-- ════════════════════════════
       INGREDIENT SCREEN
       ════════════════════════════ -->
  <div id="ingredientScreen">
    <!-- Ingredient shelf: two rows of ingredient buttons at top -->
    <div id="ingShelf">
      <div id="ingShelfInner"></div>
    </div>

    <!-- Canvas area showing the pot + falling animation -->
    <div id="ingPotArea">
      <canvas id="ingCanvas"></canvas>
    </div>

    <!-- Bottom bar: selected slots + confirm -->
    <div id="ingBottom">
      <div id="ingTitle">냄비에 재료를 넣어봐~ <span id="ingCount">(0/3)</span></div>
      <div id="selectedSlots">
        <div class="slot" id="slot0"></div>
        <div class="slot" id="slot1"></div>
        <div class="slot" id="slot2"></div>
      </div>
      <button id="confirmIngBtn" disabled>요리 시작! →</button>
    </div>
  </div>

  <!-- ════════════════════════════
       SCORE SCREEN
       ════════════════════════════ -->
  <div class="full-overlay" id="scoreScreen" style="display:none">
    <h1 class="overlay-h1">🍛 완성!</h1>
    <div id="grade"></div>
    <div id="ingredientResult"></div>
    <div class="score-row"><span>🥘 재료</span><span id="sc0">0</span></div>
    <div class="score-row"><span>🥄 젓기</span><span id="sc1">0</span></div>
    <div class="score-row"><span>🔥 불조절</span><span id="sc2">0</span></div>
    <div class="score-row score-total"><span>🏆 최종 점수</span><span id="totalScore">0점</span></div>
    <button class="big-btn" id="restartBtn">다시 하기 🍛</button>
  </div>

  <!-- ════════════════════════════
       SPLASH SCREEN
       ════════════════════════════ -->
  <div class="full-overlay" id="splashScreen">
    <h1 class="overlay-h1">🍛 카레 대결</h1>
    <div class="rule-box">
      🥘 <b>재료 선택</b> — 재료를 냄비에 탭해서 넣어줘~<br>
      &nbsp;&nbsp;&nbsp;&nbsp; 설마 이상한 재료를 넣으려는 건 아니지?<br>
      🥄 <b>젓기</b> — 방향을 맞춰 빙글빙글 저어봐~<br>
      &nbsp;&nbsp;&nbsp;&nbsp;너무 빠르면 넘치고 💦 너무 느리면 타! 🔥<br>
      🔥 <b>불조절</b> — 초록 구간에서 타이밍 맞게 눌러!
    </div>
    <button class="big-btn" id="startBtn">Start!🥄</button>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
