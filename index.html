<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카레 요리사 🍛</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;700;900&display=swap');

  :root {
    --curry: #D4880A;
    --curry-dark: #9B6007;
    --curry-light: #F5C842;
    --bg: #1A0F00;
    --bg2: #2C1A00;
    --pot: #3A3A3A;
    --pot-shine: #888;
    --red: #FF4444;
    --green: #44FF88;
    --blue: #44AAFF;
    --white: #FFF8EE;
  }

  * { margin: 0; padding: 0; box-sizing: border-box;
 -webkit-user-select:none;	
  }

  body {
    background: var(--bg);
    font-family: 'Jua', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    color: var(--white);
  }

  #gameWrapper {
    position: relative;
    width: 700px;
    height: 600px;
  }

  canvas {
    display: block;
    border-radius: 16px;
    box-shadow: 0 0 60px rgba(212,136,10,0.3);
  }

  #ui {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* HUD */
  #hud {
    position: absolute;
    top: 12px; left: 12px; right: 12px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    pointer-events: none;
  }

  .hud-box {
    background: rgba(0,0,0,0.55);
    border: 1.5px solid rgba(212,136,10,0.4);
    border-radius: 10px;
    padding: 6px 14px;
    font-size: 14px;
    color: var(--curry-light);
  }

  .hud-val {
    font-size: 22px;
    font-weight: 900;
    color: var(--white);
  }

  /* Phase title */
  #phaseTitle {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 42px;
    color: var(--curry-light);
    text-shadow: 0 0 30px var(--curry);
    pointer-events: none;
    text-align: center;
    transition: opacity 0.5s;
  }

  /* Rhythm bar */
  #rhythmBar {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%);
    width: 420px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    pointer-events: none;
  }

  #rhythmLabel {
    font-size: 14px;
    color: var(--curry-light);
    letter-spacing: 2px;
  }

  #rhythmTrack {
    width: 100%;
    height: 38px;
    background: rgba(0,0,0,0.6);
    border: 2px solid var(--curry-dark);
    border-radius: 20px;
    position: relative;
    overflow: hidden;
  }

  #rhythmZone {
    position: absolute;
    top: 0; bottom: 0;
    background: rgba(68,255,136,0.25);
    border-left: 2px solid var(--green);
    border-right: 2px solid var(--green);
    transition: left 0.05s, width 0.05s;
  }

  #rhythmCursor {
    position: absolute;
    top: 3px; bottom: 3px;
    width: 6px;
    background: var(--white);
    border-radius: 3px;
    box-shadow: 0 0 10px white;
    transition: left 0.04s linear;
  }

  #rhythmHint {
    font-size: 20px;
    color: var(--white);
    letter-spacing: 1px;
    animation: blink 0.7s infinite;
  }

  @keyframes blink {
    0%,100% { opacity:1 } 50% { opacity:0.3 }
  }

  /* Stir meter */
  #stirBar {
    position: absolute;
    right: 14px; top: 80px;
    width: 30px;
    height: 200px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
  }

  #stirLabel { font-size: 11px; color: var(--curry-light); writing-mode: vertical-rl; letter-spacing: 2px; }

  #stirOuter {
    width: 100%;
    flex: 1;
    background: rgba(0,0,0,0.5);
    border: 2px solid var(--curry-dark);
    border-radius: 8px;
    overflow: hidden;
    display: flex;
    flex-direction: column-reverse;
  }

  #stirFill {
    width: 100%;
    background: linear-gradient(to top, var(--green), var(--curry-light), var(--red));
    transition: height 0.1s;
  }

  #stirZoneMark {
    position: absolute;
    right: 0; left: 0;
    height: 2px;
    background: var(--green);
    pointer-events: none;
  }

  /* Score screen */
  #scoreScreen {
    position: absolute;
    inset: 0;
    background: rgba(10,5,0,0.92);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    border-radius: 16px;
    pointer-events: all;
  }

  #scoreScreen h1 {
    font-size: 52px;
    color: var(--curry-light);
    text-shadow: 0 0 40px var(--curry);
  }

  .score-row {
    display: flex;
    justify-content: space-between;
    width: 320px;
    font-size: 18px;
    padding: 6px 0;
    border-bottom: 1px solid rgba(212,136,10,0.2);
    color: var(--white);
  }

  .score-row span:last-child {
    color: var(--curry-light);
    font-weight: 900;
  }

  #totalScore {
    font-size: 48px;
    color: var(--curry-light);
    text-shadow: 0 0 20px orange;
  }

  #grade {
    font-size: 72px;
  }

  #restartBtn {
    margin-top: 10px;
    padding: 12px 40px;
    font-family: 'Jua', sans-serif;
    font-size: 20px;
    background: var(--curry);
    color: #000;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    pointer-events: all;
    transition: transform 0.1s, box-shadow 0.1s;
    box-shadow: 0 4px 20px rgba(212,136,10,0.5);
  }
  #restartBtn:hover { transform: scale(1.05); box-shadow: 0 6px 30px rgba(212,136,10,0.8); }

  /* Splash screen */
  #splashScreen {
    position: absolute;
    inset: 0;
    background: rgba(10,5,0,0.95);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    border-radius: 16px;
    pointer-events: all;
  }

  #splashScreen h1 { font-size: 56px; color: var(--curry-light); text-shadow: 0 0 40px var(--curry); }
  #splashScreen p { font-size: 16px; color: rgba(255,248,238,0.7); text-align: center; line-height: 1.8; max-width: 380px; }

  .rule-box {
    background: rgba(212,136,10,0.1);
    border: 1px solid rgba(212,136,10,0.3);
    border-radius: 10px;
    padding: 14px 20px;
    font-size: 15px;
    line-height: 1.9;
    max-width: 380px;
    width: 100%;
  }

  #startBtn {
    padding: 14px 50px;
    font-family: 'Jua', sans-serif;
    font-size: 22px;
    background: var(--curry);
    color: #000;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    pointer-events: all;
    box-shadow: 0 4px 20px rgba(212,136,10,0.5);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%,100% { box-shadow: 0 4px 20px rgba(212,136,10,0.5); }
    50% { box-shadow: 0 4px 40px rgba(212,136,10,1); }
  }

  /* Feedback popup */
  #feedback {
    position: absolute;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 32px;
    font-weight: 900;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    text-shadow: 0 2px 10px black;
  }
</style>
</head>
<body>

<div id="gameWrapper">
  <canvas id="gameCanvas" width="700" height="600"></canvas>

  <div id="ui">
    <div id="hud">
      <div class="hud-box">⏱ 남은 시간<br><span class="hud-val" id="timerVal">--</span></div>
      <div class="hud-box" id="phaseBox">단계: <span id="phaseName">-</span></div>
      <div class="hud-box">점수<br><span class="hud-val" id="scoreVal">0</span></div>
    </div>

    <!-- Stir phase: speed meter -->
    <div id="stirBar">
      <div id="stirOuter"><div id="stirFill" style="height:0%"></div></div>
      <div id="stirLabel">저음속도</div>
    </div>

    <!-- Fire phase: rhythm bar -->
    <div id="rhythmBar">
      <div id="rhythmLabel">🔥 불 조절 — 타이밍에 SPACE 누르기!</div>
      <div id="rhythmTrack">
        <div id="rhythmZone"></div>
        <div id="rhythmCursor"></div>
      </div>
      <div id="rhythmHint">SPACE BAR</div>
    </div>

    <div id="feedback"></div>

    <!-- Score screen -->
    <div id="scoreScreen">
      <h1>🍛 완성!</h1>
      <div id="grade"></div>
      <div class="score-row"><span>🥄 젓기 점수</span><span id="sc1">0</span></div>
      <div class="score-row"><span>🔥 불조절 점수</span><span id="sc2">0</span></div>
      <div class="score-row"><span>🌟 보너스</span><span id="sc3">0</span></div>
      <div id="totalScore">총점: 0</div>
      <button id="restartBtn">다시 하기 🍛</button>
    </div>

    <!-- Splash screen -->
    <div id="splashScreen">
      <h1>🍛 카레 요리사</h1>
      <div class="rule-box">
        🥄 <b>젓기 단계</b> — 마우스로 냄비 안을 빙글빙글 저어줘!<br>
        &nbsp;&nbsp;&nbsp;너무 세게 저으면 튀고 💦 너무 살살 저으면 타!🔥<br><br>
        🔥 <b>불조절 단계</b> — SPACE BAR를 눌러서<br>
        &nbsp;&nbsp;&nbsp;초록 구간에 딱 맞게 타이밍을 잡아봐!<br><br>
        두 단계 합산으로 최종 점수가 결정돼!
      </div>
      <button id="startBtn">요리 시작! 🥄</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// UI refs
const timerVal = document.getElementById('timerVal');
const phaseName = document.getElementById('phaseName');
const scoreVal = document.getElementById('scoreVal');
const stirBar = document.getElementById('stirBar');
const stirFill = document.getElementById('stirFill');
const rhythmBar = document.getElementById('rhythmBar');
const rhythmZone = document.getElementById('rhythmZone');
const rhythmCursor = document.getElementById('rhythmCursor');
const scoreScreen = document.getElementById('scoreScreen');
const splashScreen = document.getElementById('splashScreen');
const feedbackEl = document.getElementById('feedback');

// ========================
//  GAME STATE
// ========================
let phase = 'splash'; // splash → stir → fire → result
let stirScore = 0;
let fireScore = 0;
let stirTime = 28; // seconds
let stirTimeLeft = stirTime;
let fireBeats = 10;
let fireDone = 0;

// Stir
let mouseX = 350, mouseY = 300;
let prevAngle = null;
let angularVelocity = 0;
let stirGoodTime = 0; // accumulated good stir time
let stirBadTime = 0;
let splashParticles = [];
let burnLevel = 0; // 0-1
let lastMouseX = 350, lastMouseY = 300;
let stirDirection = 0; // 1 or -1
let totalAngleTraveled = 0;
let prevStirAngle = null;

// Pot / curry visual
let bubbles = [];
let ripples = [];
let currySplats = [];

// Fire rhythm
let cursor = 0; // 0-1 position
let cursorDir = 1;
let cursorSpeed = 0.012;
let zoneStart = 0.38;
let zoneWidth = 0.18;
let beatResult = []; // 'perfect','good','miss' per beat
let rhythmActive = false;
let hitCooldown = 0;

// Animation
let lastTime = 0;
let animId;

// Scoring
let currentScore = 0;

// ========================
//  POT / BACKGROUND DRAWING
// ========================
const POT_CX = 350;
const POT_CY = 330;
const POT_RX = 200;
const POT_RY = 155;

function drawBackground() {
  // Kitchen background
  let grad = ctx.createLinearGradient(0, 0, 0, 600);
  grad.addColorStop(0, '#1A0A00');
  grad.addColorStop(1, '#0D0600');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 700, 600);

  // Counter
  let counter = ctx.createLinearGradient(0, 420, 0, 600);
  counter.addColorStop(0, '#2A1800');
  counter.addColorStop(1, '#1A0E00');
  ctx.fillStyle = counter;
  ctx.fillRect(0, 450, 700, 150);

  // Counter edge
  ctx.fillStyle = '#3D2200';
  ctx.fillRect(0, 448, 700, 6);

  // Tiles on wall
  for (let r = 0; r < 3; r++) {
    for (let c = 0; c < 10; c++) {
      ctx.strokeStyle = 'rgba(60,30,0,0.4)';
      ctx.lineWidth = 1;
      ctx.strokeRect(c * 70, r * 70 + 10, 70, 70);
    }
  }
}

function drawFlame(intensity) {
  // intensity 0-1
  if (intensity <= 0) return;
  const baseX = POT_CX;
  const baseY = POT_CY + POT_RY + 30;
  const flameCount = 3 + Math.floor(intensity * 4);

  for (let i = 0; i < flameCount; i++) {
    const ox = (i - flameCount / 2) * 28;
    const h = 30 + intensity * 50 + Math.sin(Date.now() / 120 + i) * 8;
    const grad = ctx.createRadialGradient(baseX + ox, baseY, 0, baseX + ox, baseY - h / 2, h);
    grad.addColorStop(0, 'rgba(255,240,80,0.9)');
    grad.addColorStop(0.4, 'rgba(255,120,0,0.7)');
    grad.addColorStop(1, 'rgba(255,30,0,0)');
    ctx.beginPath();
    ctx.ellipse(baseX + ox, baseY, 14, h, 0, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
  }

  // Glow under pot
  const glow = ctx.createRadialGradient(baseX, baseY - 10, 0, baseX, baseY - 10, 120);
  glow.addColorStop(0, `rgba(255,100,0,${0.12 * intensity})`);
  glow.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = glow;
  ctx.fillRect(baseX - 130, baseY - 60, 260, 80);
}

function drawPot() {
  // Shadow
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.6)';
  ctx.shadowBlur = 30;
  ctx.shadowOffsetY = 20;

  // Pot body
  const pg = ctx.createLinearGradient(POT_CX - POT_RX, 0, POT_CX + POT_RX, 0);
  pg.addColorStop(0, '#222');
  pg.addColorStop(0.3, '#555');
  pg.addColorStop(0.6, '#888');
  pg.addColorStop(1, '#222');
  ctx.fillStyle = pg;
  ctx.beginPath();
  ctx.ellipse(POT_CX, POT_CY, POT_RX + 10, POT_RY + 20, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Pot inside (curry)
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(POT_CX, POT_CY - 10, POT_RX - 14, POT_RY - 18, 0, 0, Math.PI * 2);
  ctx.clip();

  // Curry base color (gets darker with burn)
  const r = Math.round(180 - burnLevel * 80);
  const g = Math.round(100 - burnLevel * 80);
  const b = 10;
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fillRect(POT_CX - POT_RX, POT_CY - POT_RY - 20, POT_RX * 2, POT_RY * 2 + 20);

  // Curry texture swirl
  ctx.globalAlpha = 0.18;
  for (let i = 0; i < 4; i++) {
    const swX = POT_CX + Math.cos(Date.now() / 1500 + i * 1.5) * 60;
    const swY = POT_CY - 10 + Math.sin(Date.now() / 1500 + i * 1.5) * 30;
    const sg = ctx.createRadialGradient(swX, swY, 0, swX, swY, 70);
    sg.addColorStop(0, '#F5A800');
    sg.addColorStop(1, 'rgba(245,168,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(swX, swY, 70, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Curry splats
  for (let s of currySplats) {
    ctx.globalAlpha = s.a;
    ctx.fillStyle = '#C87000';
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Bubbles
  for (let b of bubbles) {
    ctx.globalAlpha = b.a;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,200,80,${b.a})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Ripples from stir
  for (let rp of ripples) {
    ctx.globalAlpha = rp.a;
    ctx.beginPath();
    ctx.ellipse(rp.x, rp.y, rp.rx, rp.ry, 0, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(255,200,80,${rp.a * 0.8})`;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  // Burn overlay
  if (burnLevel > 0) {
    ctx.fillStyle = `rgba(10,0,0,${burnLevel * 0.65})`;
    ctx.fillRect(POT_CX - POT_RX, POT_CY - POT_RY - 20, POT_RX * 2, POT_RY * 2 + 20);
    // Smoke
    if (burnLevel > 0.3) {
      for (let i = 0; i < 3; i++) {
        const sx = POT_CX + (i - 1) * 50;
        const sy = POT_CY - POT_RY - 20;
        const sg = ctx.createRadialGradient(sx, sy - 20, 0, sx, sy - 20, 40);
        sg.addColorStop(0, `rgba(80,80,80,${burnLevel * 0.5})`);
        sg.addColorStop(1, 'rgba(80,80,80,0)');
        ctx.fillStyle = sg;
        ctx.beginPath();
        ctx.arc(sx, sy - 20 + Math.sin(Date.now() / 600 + i) * 8, 40, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  ctx.restore();

  // Pot rim
  const rim = ctx.createLinearGradient(0, POT_CY - POT_RY - 10, 0, POT_CY - POT_RY + 12);
  rim.addColorStop(0, '#AAA');
  rim.addColorStop(0.5, '#EEE');
  rim.addColorStop(1, '#555');
  ctx.beginPath();
  ctx.ellipse(POT_CX, POT_CY - POT_RY + 2, POT_RX + 4, 22, 0, 0, Math.PI * 2);
  ctx.fillStyle = rim;
  ctx.fill();

  // Handles
  for (let side of [-1, 1]) {
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(POT_CX + side * (POT_RX + 10), POT_CY, 22, 16, 0, 0, Math.PI * 2);
    const hg = ctx.createLinearGradient(0, POT_CY - 16, 0, POT_CY + 16);
    hg.addColorStop(0, '#888');
    hg.addColorStop(1, '#333');
    ctx.fillStyle = hg;
    ctx.fill();
    ctx.restore();
  }
}

function drawSpoon() {
  if (phase !== 'stir') return;
  const angle = Math.atan2(mouseY - POT_CY, mouseX - POT_CX);
  const dist = Math.min(Math.hypot(mouseX - POT_CX, mouseY - (POT_CY - 10)), POT_RX - 30);
  const sx = POT_CX + Math.cos(angle) * dist;
  const sy = (POT_CY - 10) + Math.sin(angle) * dist;

  ctx.save();
  ctx.translate(sx, sy - 40);
  ctx.rotate(angle + Math.PI / 2);

  // Spoon handle
  const sg = ctx.createLinearGradient(-4, 0, 4, 0);
  sg.addColorStop(0, '#DDD');
  sg.addColorStop(0.5, '#FFF');
  sg.addColorStop(1, '#999');
  ctx.fillStyle = sg;
  ctx.beginPath();
  ctx.roundRect(-3, 0, 6, 60, 3);
  ctx.fill();

  // Spoon head
  ctx.beginPath();
  ctx.ellipse(0, 66, 9, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#CCC';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Curry drip on spoon
  ctx.fillStyle = `rgba(200,120,0,0.7)`;
  ctx.beginPath();
  ctx.ellipse(0, 66, 6, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Splash particles (when stirring too fast)
function drawSplashParticles() {
  for (let p of splashParticles) {
    ctx.globalAlpha = p.a;
    ctx.fillStyle = `hsl(${p.hue},80%,50%)`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

// ========================
//  STIR PHASE LOGIC
// ========================
let stirPenalty = 0; // accumulated penalty

function updateStir(dt) {
  // Mouse angle relative to pot center
  const dx = mouseX - POT_CX;
  const dy = mouseY - (POT_CY - 10);
  const angle = Math.atan2(dy, dx);
  const dist = Math.hypot(dx, dy);

  if (dist < 30) { prevStirAngle = null; return; }

  if (prevStirAngle !== null) {
    let dAngle = angle - prevStirAngle;
    // Normalize to -π ~ π
    while (dAngle > Math.PI) dAngle -= Math.PI * 2;
    while (dAngle < -Math.PI) dAngle += Math.PI * 2;

    angularVelocity = dAngle / dt;
    totalAngleTraveled += Math.abs(dAngle);
  }
  prevStirAngle = angle;

  // Speed check: |angularVelocity| rad/s
  const speed = Math.abs(angularVelocity);
  // Good zone: 1.5 ~ 5 rad/s
  const goodMin = 1.2, goodMax = 5.5;

  if (speed > goodMax) {
    // Too fast → splash
    stirBadTime += dt;
    burnLevel = Math.max(0, burnLevel - dt * 0.02);
    if (Math.random() < 0.4) spawnSplash();
  } else if (speed > goodMin) {
    // Just right
    stirGoodTime += dt;
    burnLevel = Math.max(0, burnLevel - dt * 0.1);
    if (Math.random() < 0.15) spawnRipple();
    if (Math.random() < 0.04) spawnBubble();
  } else {
    // Too slow → burn
    burnLevel = Math.min(1, burnLevel + dt * 0.06);
    stirBadTime += dt * 0.5;
  }

  // Bubble simulation
  if (Math.random() < 0.03) spawnBubble();

  // Update bubbles
  for (let b of bubbles) {
    b.y -= b.speed * dt;
    b.a -= dt * 0.8;
  }
  bubbles = bubbles.filter(b => b.a > 0);

  // Update ripples
  for (let r of ripples) {
    r.rx += dt * 40;
    r.ry += dt * 25;
    r.a -= dt * 1.5;
  }
  ripples = ripples.filter(r => r.a > 0);

  // Update splats
  for (let s of currySplats) {
    s.a -= dt * 0.3;
  }
  currySplats = currySplats.filter(s => s.a > 0);

  // Update splash particles
  for (let p of splashParticles) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 400 * dt;
    p.a -= dt * 1.5;
  }
  splashParticles = splashParticles.filter(p => p.a > 0);

  // Stir meter UI
  const speedNorm = Math.min(speed / (goodMax * 1.3), 1);
  stirFill.style.height = (speedNorm * 100) + '%';

  // Color feedback
  if (speed > goodMax) {
    stirFill.style.background = 'linear-gradient(to top, #FF4444, #FF8844)';
  } else if (speed > goodMin) {
    stirFill.style.background = 'linear-gradient(to top, #44FF88, #AAFF44)';
  } else {
    stirFill.style.background = 'linear-gradient(to top, #FF8800, #FFCC00)';
  }

  // Stir time countdown
  stirTimeLeft -= dt;
  timerVal.textContent = Math.max(0, Math.ceil(stirTimeLeft)) + 's';

  if (stirTimeLeft <= 0) {
    endStirPhase();
  }
}

function spawnSplash() {
  const angle = Math.random() * Math.PI * 2;
  const speed = 150 + Math.random() * 250;
  splashParticles.push({
    x: POT_CX + Math.cos(angle) * (POT_RX - 30),
    y: (POT_CY - 10) + Math.sin(angle) * (POT_RY - 25) * 0.6,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - 80,
    r: 3 + Math.random() * 5,
    hue: 25 + Math.random() * 20,
    a: 1
  });
  // Splat on inside
  currySplats.push({
    x: POT_CX + (Math.random() - 0.5) * (POT_RX * 1.5),
    y: (POT_CY - 10) + (Math.random() - 0.5) * POT_RY,
    r: 4 + Math.random() * 8,
    a: 0.7
  });
}

function spawnBubble() {
  bubbles.push({
    x: POT_CX + (Math.random() - 0.5) * (POT_RX - 30) * 1.6,
    y: POT_CY + (Math.random() - 0.5) * (POT_RY - 20) * 0.6,
    r: 2 + Math.random() * 6,
    speed: 20 + Math.random() * 40,
    a: 0.7 + Math.random() * 0.3
  });
}

function spawnRipple() {
  ripples.push({
    x: POT_CX + (Math.random() - 0.5) * 80,
    y: POT_CY - 10 + (Math.random() - 0.5) * 40,
    rx: 5, ry: 3, a: 0.8
  });
}

function endStirPhase() {
  // Calculate stir score
  const total = stirGoodTime + stirBadTime + 0.001;
  const ratio = stirGoodTime / (stirTime);
  stirScore = Math.round(ratio * 100 * (1 - burnLevel * 0.5));
  stirScore = Math.max(0, Math.min(100, stirScore));

  showFeedback(stirScore >= 70 ? '완벽한 젓기! 🥄' : stirScore >= 40 ? '그럭저럭...' : '타버렸어! 🔥', stirScore >= 70 ? '#44FF88' : stirScore >= 40 ? '#FFD700' : '#FF4444');

  setTimeout(() => startFirePhase(), 1800);
}

// ========================
//  FIRE PHASE LOGIC
// ========================
let firePhaseTime = 0;
let firePhaseBeats = [];
let nextBeatTime = 1.5;
let beatIndex = 0;
let firePhaseActive = false;
let zoneSpeed = 0.008;

function startFirePhase() {
  phase = 'fire';
  phaseName.textContent = '🔥 불조절';
  firePhaseActive = true;
  firePhaseTime = 0;
  beatIndex = 0;
  beatResult = [];
  fireDone = 0;
  cursor = 0;
  cursorDir = 1;
  nextBeatTime = 1.2;
  cursor = 0.1;

  stirBar.style.display = 'none';
  rhythmBar.style.display = 'flex';

  // Generate beats with varying zone sizes and speeds
  firePhaseBeats = [];
  for (let i = 0; i < fireBeats; i++) {
    firePhaseBeats.push({
      time: 1.2 + i * 1.8,
      zoneStart: 0.25 + Math.random() * 0.35,
      zoneWidth: 0.12 + Math.random() * 0.12,
      speed: 0.009 + Math.random() * 0.008
    });
  }

  timerVal.textContent = fireBeats + ' 박자';
  hitCooldown = 0;
}

function updateFire(dt) {
  firePhaseTime += dt;

  // Current beat
  if (beatIndex < firePhaseBeats.length) {
    const beat = firePhaseBeats[beatIndex];
    cursorSpeed = beat.speed;
    zoneStart = beat.zoneStart;
    zoneWidth = beat.zoneWidth;

    // Cursor bounces
    cursor += cursorDir * cursorSpeed * dt * 60;
    if (cursor >= 1) { cursor = 1; cursorDir = -1; }
    if (cursor <= 0) { cursor = 0; cursorDir = 1; }

    // Update UI
    rhythmZone.style.left = (zoneStart * 100) + '%';
    rhythmZone.style.width = (zoneWidth * 100) + '%';
    rhythmCursor.style.left = `calc(${cursor * 100}% - 3px)`;

    timerVal.textContent = `${beatIndex + 1} / ${fireBeats}`;

    // Timeout — if no hit in 2s past beat time, miss
    if (firePhaseTime > beat.time + 2.0) {
      beatResult.push('miss');
      showBeatFeedback('MISS 💨', '#FF4444');
      beatIndex++;
      hitCooldown = 0;
    }
  } else {
    // All beats done
    endFirePhase();
  }

  if (hitCooldown > 0) hitCooldown -= dt;
}

function onSpacePress() {
  if (phase !== 'fire' || hitCooldown > 0) return;
  if (beatIndex >= firePhaseBeats.length) return;

  const beat = firePhaseBeats[beatIndex];
  if (firePhaseTime < beat.time - 0.4) {
    // Too early (before the beat is even shown) - ignore
    return;
  }

  const inZone = cursor >= zoneStart && cursor <= zoneStart + zoneWidth;
  const centerDist = Math.abs(cursor - (zoneStart + zoneWidth / 2)) / (zoneWidth / 2);

  if (inZone) {
    if (centerDist < 0.3) {
      beatResult.push('perfect');
      showBeatFeedback('PERFECT! 🔥', '#FFD700');
    } else {
      beatResult.push('good');
      showBeatFeedback('GOOD! ✓', '#44FF88');
    }
  } else {
    beatResult.push('miss');
    showBeatFeedback('MISS 💨', '#FF4444');
  }

  beatIndex++;
  hitCooldown = 0.3;
}

function endFirePhase() {
  rhythmBar.style.display = 'none';
  firePhaseActive = false;

  // Calculate fire score
  let pts = 0;
  for (let r of beatResult) {
    if (r === 'perfect') pts += 10;
    else if (r === 'good') pts += 6;
  }
  fireScore = Math.round((pts / (fireBeats * 10)) * 100);

  setTimeout(() => showResult(), 1000);
}

// ========================
//  RESULT
// ========================
function showResult() {
  phase = 'result';

  const bonus = stirScore > 80 && fireScore > 80 ? 20 : 0;
  const total = stirScore + fireScore + bonus;

  let grade = '😭 탄 카레';
  if (total >= 180) grade = '👑 마스터 셰프!';
  else if (total >= 150) grade = '⭐ 훌륭해!';
  else if (total >= 110) grade = '😊 먹을 만해~';
  else if (total >= 70) grade = '🤔 좀 더 연습하자';

  document.getElementById('sc1').textContent = stirScore + '점';
  document.getElementById('sc2').textContent = fireScore + '점';
  document.getElementById('sc3').textContent = bonus + '점';
  document.getElementById('totalScore').textContent = '총점: ' + total + ' / 220';
  document.getElementById('grade').textContent = grade;

  scoreScreen.style.display = 'flex';
}

// ========================
//  FEEDBACK
// ========================
function showFeedback(text, color) {
  feedbackEl.textContent = text;
  feedbackEl.style.color = color;
  feedbackEl.style.opacity = '1';
  setTimeout(() => { feedbackEl.style.opacity = '0'; }, 1500);
}

let beatFeedbackTimer = null;
function showBeatFeedback(text, color) {
  feedbackEl.textContent = text;
  feedbackEl.style.color = color;
  feedbackEl.style.opacity = '1';
  if (beatFeedbackTimer) clearTimeout(beatFeedbackTimer);
  beatFeedbackTimer = setTimeout(() => { feedbackEl.style.opacity = '0'; }, 700);
}

// ========================
//  MAIN LOOP
// ========================
function drawStirHUD() {
  if (phase !== 'stir') return;
  // Speed indicator text inside pot
  const speed = Math.abs(angularVelocity);
  const goodMin = 1.2, goodMax = 5.5;
  let hint = '천천히 저어줘 🥄';
  let hintColor = 'rgba(255,200,80,0.9)';
  if (speed > goodMax) { hint = '너무 세! 튄다! 💦'; hintColor = '#FF6644'; }
  else if (speed > goodMin) { hint = '딱 좋아! 👌'; hintColor = '#88FF88'; }

  ctx.font = 'bold 18px Jua, sans-serif';
  ctx.fillStyle = hintColor;
  ctx.textAlign = 'center';
  ctx.fillText(hint, POT_CX, POT_CY + POT_RY + 55);

  // Burn bar
  const bx = 30, by = 95, bw = 20, bh = 180;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  ctx.roundRect(bx, by, bw, bh, 5);
  ctx.fill();

  const burnH = burnLevel * bh;
  const burnGrad = ctx.createLinearGradient(0, by + bh, 0, by);
  burnGrad.addColorStop(0, '#FF2200');
  burnGrad.addColorStop(0.5, '#FF8800');
  burnGrad.addColorStop(1, '#FFD700');
  ctx.fillStyle = burnGrad;
  ctx.beginPath();
  ctx.roundRect(bx, by + bh - burnH, bw, burnH, 5);
  ctx.fill();

  ctx.font = '11px Jua, sans-serif';
  ctx.fillStyle = '#FFB060';
  ctx.textAlign = 'center';
  ctx.fillText('🔥', bx + bw / 2, by - 4);
  ctx.fillText('탐', bx + bw / 2, by + bh + 14);
}

let flameIntensity = 0.5;
let targetFlameIntensity = 0.5;

function gameLoop(ts) {
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0, 0, 700, 600);
  drawBackground();

  // Flame
  if (phase === 'stir') {
    flameIntensity = 0.4 + burnLevel * 0.5;
  } else if (phase === 'fire') {
    flameIntensity = 0.3 + cursor * 0.7;
  }
  drawFlame(flameIntensity);
  drawPot();
  drawSplashParticles();
  drawSpoon();
  drawStirHUD();

  if (phase === 'stir') updateStir(dt);
  if (phase === 'fire') updateFire(dt);

  animId = requestAnimationFrame(gameLoop);
}

// ========================
//  INPUT
// ========================
canvas.addEventListener('mousemove', (e) => {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});

document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    onSpacePress();
  }
});

// ========================
//  START
// ========================
function startGame() {
  splashScreen.style.display = 'none';
  scoreScreen.style.display = 'none';

  phase = 'stir';
  phaseName.textContent = '🥄 젓기';
  stirTimeLeft = stirTime;
  stirGoodTime = 0;
  stirBadTime = 0;
  burnLevel = 0;
  bubbles = [];
  ripples = [];
  currySplats = [];
  splashParticles = [];
  prevStirAngle = null;
  angularVelocity = 0;
  stirScore = 0;
  fireScore = 0;

  stirBar.style.display = 'flex';
  rhythmBar.style.display = 'none';

  showFeedback('빙글빙글 저어줘! 🥄', '#F5C842');
}

document.getElementById('startBtn').addEventListener('click', () => {
  lastTime = performance.now();
  requestAnimationFrame((ts) => { lastTime = ts; gameLoop(ts); });
  startGame();
});

document.getElementById('restartBtn').addEventListener('click', () => {
  scoreScreen.style.display = 'none';
  startGame();
});

// Initial render loop (for splash)
function splashLoop(ts) {
  if (phase !== 'splash') return;
  ctx.clearRect(0, 0, 700, 600);
  drawBackground();
  drawFlame(0.6);
  drawPot();
  // Idle bubbles
  if (Math.random() < 0.05) spawnBubble();
  for (let b of bubbles) { b.y -= b.speed * 0.016; b.a -= 0.016 * 0.8; }
  bubbles = bubbles.filter(b => b.a > 0);
  lastTime = ts;
  requestAnimationFrame(splashLoop);
}
requestAnimationFrame(splashLoop);
</script>
